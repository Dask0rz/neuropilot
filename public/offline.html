<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yukino – Hors ligne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      background: #1a1a2e;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      border: 1px solid #2a2a3e;
    }

    .icon svg {
      width: 36px;
      height: 36px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #888;
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #7c3aed;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn:active { background: #6d28d9; }

    .tip {
      margin-top: 40px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
    </svg>
  </div>

  <h1>Tu es hors ligne</h1>
  <p>Yukino a besoin d'une connexion internet pour charger tes leçons et sauvegarder ta progression.</p>

  <a class="btn" href="/" onclick="window.location.reload(); return false;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    Réessayer
  </a>

  <p class="tip">Reconnecte-toi au Wi-Fi ou active tes données mobiles.</p>
</body>
</html>
